version: '3.8'

services:
  dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - DATABASE_URL=file:./sqlite.db
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npx prisma db seed && npm run dev"
    stdin_open: true
    tty: true

volumes:
  node_modules:
  next_cache:
